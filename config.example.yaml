telegram:
  token: "YOUR_BOT_TOKEN"
  allowed_user_ids:
    - 123456789  # твой Telegram user ID

router:
  # путь к бинарнику xkeen (значение по умолчанию: /opt/sbin/xkeen)
  xkeen_path: "/opt/sbin/xkeen"
  # имя WireGuard-интерфейса для отображения пиров в /clients (если не задано — секция не показывается)
  wireguard_iface: "Wireguard0"

  # /route: путь к xk-geodat и routing.json, список правил для выбора
  geodat_tool: "/opt/etc/xkeen-ui/bin/xk-geodat"
  routing_file: "/opt/etc/xray/configs/05_routing.json"
  routing_outbounds:
    - "vless-reality"
    - "vless-reality-fi"
